<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Extended Metadata</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="./styles.css" />

    <script>
      if (localStorage.getItem("gts-theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 0;
        background-color: var(--bg-base);
      }
      .exif-editor-header {
        padding: 22px 28px 16px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border-color);
      }
      .exif-editor-header p {
        margin: 0 0 4px;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .exif-editor-header h2 {
        margin: 0;
        font-size: 19px;
        line-height: 1.35;
        word-break: break-all;
      }
      .editor-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 28px;
        background: var(--bg-base);
        border-bottom: 1px solid var(--border-color);
      }
      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .status-pill {
        color: var(--text-muted);
        font-size: 12px;
        white-space: nowrap;
      }
      .exif-editor-body {
        overflow-y: auto;
        padding: 14px 28px 24px;
      }
      .field-row {
        display: grid;
        grid-template-columns:
          minmax(130px, 0.75fr) minmax(180px, 1fr)
          auto;
        gap: 10px;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid var(--border-color);
      }
      .field-key {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 500;
        word-break: break-word;
      }
      .field-value {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-panel);
        color: var(--text-main);
        font-family: "Poppins", sans-serif;
        font-size: 12px;
        padding: 8px 10px;
        outline: none;
      }
      .field-value:focus {
        border-color: var(--gts-teal);
        box-shadow: 0 0 0 3px rgba(29, 100, 135, 0.12);
      }
      .field-actions {
        display: flex;
        gap: 6px;
      }
      .field-row.removed {
        opacity: 0.55;
      }
      .field-row.removed .field-value {
        text-decoration: line-through;
      }
      .field-row.dirty .field-key::after {
        content: " edited";
        color: var(--gts-teal);
        font-size: 10px;
        font-weight: 600;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.45);
        z-index: 20000;
        padding: 24px;
      }
      .modal-backdrop.active {
        display: flex;
      }
      .date-modal {
        width: min(420px, 100%);
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        box-shadow: 0 22px 50px rgba(0, 0, 0, 0.24);
        padding: 22px;
      }
      .date-modal h3 {
        margin: 0 0 6px;
        font-size: 18px;
        color: var(--text-main);
      }
      .date-modal p {
        margin: 0 0 18px;
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
      }
      .date-grid {
        display: grid;
        gap: 12px;
      }
      .date-grid label {
        display: grid;
        gap: 6px;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .date-grid input {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: var(--bg-base);
        color: var(--text-main);
        font-family: "Poppins", sans-serif;
        padding: 10px;
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <div class="exif-editor-header">
      <p>Editable ExifTool Output</p>
      <h2 id="win-filename">Loading Data...</h2>
    </div>

    <div class="editor-toolbar">
      <span id="selection-status" class="status-pill">0 selected targets</span>
      <div class="toolbar-actions">
        <button id="randomize-date-btn" class="icon-btn">
          <span
            class="material-symbols-rounded"
            style="font-size: 16px; margin-right: 6px"
            >event_repeat</span
          >
          Randomize Date
        </button>
        <button id="apply-current-btn" class="icon-btn">
          <span
            class="material-symbols-rounded"
            style="font-size: 16px; margin-right: 6px"
            >save</span
          >
          Apply Current
        </button>
        <button id="apply-selected-btn" class="icon-btn active">
          <span
            class="material-symbols-rounded"
            style="font-size: 16px; margin-right: 6px"
            >done_all</span
          >
          Apply Selected
        </button>
      </div>
    </div>

    <div class="exif-editor-body" id="field-list"></div>

    <div class="modal-backdrop" id="date-modal">
      <div class="date-modal">
        <h3>Randomize Date Metadata</h3>
        <p>
          Each selected file will receive a random timestamp between the start
          and end dates.
        </p>
        <div class="date-grid">
          <label>
            Start Date
            <input id="random-start-date" type="datetime-local" />
          </label>
          <label>
            End Date
            <input id="random-end-date" type="datetime-local" />
          </label>
        </div>
        <div class="modal-actions">
          <button id="cancel-randomize-btn" class="icon-btn">Cancel</button>
          <button id="confirm-randomize-btn" class="icon-btn active">
            <span
              class="material-symbols-rounded"
              style="font-size: 16px; margin-right: 6px"
              >shuffle</span
            >
            Apply Random Dates
          </button>
        </div>
      </div>
    </div>

    <div id="progress-modal" class="progress-modal">
      <div class="progress-box">
        <h3 id="progress-title">Processing...</h3>
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
        <div class="progress-stats">
          <span id="progress-percent">0%</span>
          <span id="progress-count">0 / 0</span>
        </div>
        <div
          id="progress-detail"
          class="progress-detail"
          style="margin-bottom: 20px"
        >
          Preparing...
        </div>

        <div style="text-align: center">
          <button
            id="cancel-progress-btn"
            class="icon-btn"
            style="
              display: inline-flex;
              justify-content: center;
              padding: 6px 16px;
              border-color: #f87171;
              color: #ef4444;
              width: 100%;
            "
          >
            <span
              class="material-symbols-rounded"
              style="font-size: 16px; margin-right: 6px"
              >cancel</span
            >
            Cancel Task
          </button>
        </div>
      </div>
    </div>

    <script>
      // ==========================================
      // PROGRESS MODAL LOGIC
      // ==========================================
      const progModal = document.getElementById("progress-modal");
      const progTitle = document.getElementById("progress-title");
      const progFill = document.getElementById("progress-fill");
      const progPercent = document.getElementById("progress-percent");
      const progCount = document.getElementById("progress-count");
      const progDetail = document.getElementById("progress-detail");

      let isTaskCancelled = false;

      document
        .getElementById("cancel-progress-btn")
        .addEventListener("click", () => {
          isTaskCancelled = true;
          document.getElementById("progress-title").textContent =
            "Cancelling...";
          document.getElementById("progress-detail").textContent =
            "Cleaning up files and restoring backups...";
          window.electronAPI.cancelTask();
        });

      function showProgress(title) {
        isTaskCancelled = false;
        progTitle.textContent = title;
        progFill.style.width = "0%";
        progPercent.textContent = "0%";
        progCount.textContent = "";
        progDetail.textContent = "Starting...";
        progModal.classList.add("active");
      }

      function updateProgress(current, total, detail) {
        const percent =
          total > 0 ? Math.min(100, Math.round((current / total) * 100)) : 0;
        progFill.style.width = `${percent}%`;
        progPercent.textContent = `${percent}%`;
        progCount.textContent = `${Math.floor(current)} / ${total}`;
        if (detail) progDetail.textContent = detail;
      }

      function hideProgress() {
        progModal.classList.remove("active");
      }

      window.electronAPI.onTaskProgress((payload) => {
        if (!progModal.classList.contains("active"))
          showProgress(payload.title);
        updateProgress(payload.current, payload.total, payload.detail);
      });

      // ==========================================
      // EXIF EDITOR LOGIC
      // ==========================================
      let currentPayload = null;
      const originalValues = new Map();
      const editedValues = new Map();
      const removedTags = new Set();

      const ignoredKeys = [
        "SourceFile",
        "ExifToolVersion",
        "FileName",
        "Directory",
        "FileSize",
        "FileModifyDate",
        "FileAccessDate",
        "FileInodeChangeDate",
      ];

      function escapeHtml(value) {
        return String(value).replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[char],
        );
      }

      function updateStatus(message) {
        document.getElementById("selection-status").textContent = message;
      }

      function getChanges() {
        const edits = [];
        editedValues.forEach((value, tag) => {
          if (!removedTags.has(tag) && value !== originalValues.get(tag)) {
            edits.push({ tag, value });
          }
        });
        return {
          edits,
          removals: Array.from(removedTags),
        };
      }

      function renderFields(exifData) {
        const list = document.getElementById("field-list");
        list.innerHTML = "";

        Object.keys(exifData)
          .sort()
          .forEach((key) => {
            const value = exifData[key];
            if (ignoredKeys.includes(key) || typeof value === "object") return;

            originalValues.set(key, String(value));
            editedValues.set(key, String(value));

            const row = document.createElement("div");
            row.className = "field-row";
            row.dataset.tag = key;
            row.innerHTML = `
                    <div class="field-key">${escapeHtml(key)}</div>
                    <input class="field-value" value="${escapeHtml(value)}">
                    <div class="field-actions">
                        <button class="icon-btn copy-field-btn" title="Copy field">
                            <span class="material-symbols-rounded" style="font-size: 16px;">content_copy</span>
                        </button>
                        <button class="icon-btn remove-field-btn" title="Remove field">
                            <span class="material-symbols-rounded" style="font-size: 16px;">delete</span>
                        </button>
                    </div>
                `;

            const input = row.querySelector(".field-value");
            input.addEventListener("input", () => {
              editedValues.set(key, input.value);
              row.classList.toggle(
                "dirty",
                input.value !== originalValues.get(key),
              );
            });

            row
              .querySelector(".copy-field-btn")
              .addEventListener("click", async () => {
                await window.electronAPI.copyText(`${key}: ${input.value}`);
                updateStatus(`Copied ${key}`);
              });

            row
              .querySelector(".remove-field-btn")
              .addEventListener("click", () => {
                if (removedTags.has(key)) {
                  removedTags.delete(key);
                  row.classList.remove("removed");
                } else {
                  removedTags.add(key);
                  row.classList.add("removed");
                }
              });

            list.appendChild(row);
          });
      }

      async function applyChanges(targetPaths) {
        const changes = getChanges();
        if (changes.edits.length === 0 && changes.removals.length === 0) {
          alert("No edited or removed metadata fields to apply.");
          return;
        }

        updateStatus("Applying metadata changes...");
        showProgress("Applying Metadata Edits");
        const result = await window.electronAPI.applyExifEdits({
          targetPaths,
          extension: currentPayload.extension,
          edits: changes.edits,
          removals: changes.removals,
        });
        hideProgress();

        if (result.error) {
          alert(result.error);
          updateStatus("Changes were not applied.");
          return;
        }

        updateStatus(`Applied changes to ${targetPaths.length} file(s).`);
      }

      function openDateModal() {
        document.getElementById("date-modal").classList.add("active");
      }

      function closeDateModal() {
        document.getElementById("date-modal").classList.remove("active");
      }

      window.electronAPI.onRenderExif((payload) => {
        currentPayload = payload;
        if (payload.theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }

        document.getElementById("win-filename").textContent = payload.filename;
        document.title = `EXIF: ${payload.filename}`;
        const targetCount = payload.targetPaths?.length || 1;
        updateStatus(
          `${targetCount} target file${targetCount === 1 ? "" : "s"} ready`,
        );
        renderFields(payload.exifData);
      });

      document
        .getElementById("apply-current-btn")
        .addEventListener("click", () => {
          applyChanges([currentPayload.filePath]);
        });

      document
        .getElementById("apply-selected-btn")
        .addEventListener("click", () => {
          applyChanges(
            currentPayload.targetPaths?.length
              ? currentPayload.targetPaths
              : [currentPayload.filePath],
          );
        });

      document
        .getElementById("randomize-date-btn")
        .addEventListener("click", openDateModal);
      document
        .getElementById("cancel-randomize-btn")
        .addEventListener("click", closeDateModal);

      document
        .getElementById("confirm-randomize-btn")
        .addEventListener("click", async () => {
          const startDate = document.getElementById("random-start-date").value;
          const endDate = document.getElementById("random-end-date").value;
          const targetPaths = currentPayload.targetPaths?.length
            ? currentPayload.targetPaths
            : [currentPayload.filePath];

          closeDateModal();
          updateStatus("Applying random dates...");
          showProgress("Randomizing Dates");
          const result = await window.electronAPI.randomizeExifDate({
            targetPaths,
            extension: currentPayload.extension,
            startDate,
            endDate,
          });
          hideProgress();

          if (result.error) {
            alert(result.error);
            updateStatus("Random dates were not applied.");
            return;
          }

          updateStatus(`Randomized dates for ${targetPaths.length} file(s).`);
        });
    </script>
  </body>
</html>
